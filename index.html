<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Reply Helper</title>
<style>
  /* Body with dark gradient */
  body {
    margin:0;
    padding:0;
    font-family:"Segoe UI", sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    overflow:hidden;
    color:white;
  }

  /* Floating orbs canvas */
  #bgCanvas {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
  }

  h1 {
    margin:20px 0;
    font-size:32px;
    letter-spacing:1px;
    text-shadow: 0 0 12px rgba(255,255,255,0.3);
  }

  textarea {
    width:90%;
    max-width:450px;
    height:70px;
    padding:14px;
    font-size:16px;
    border-radius:50px;
    border:none;
    outline:none;
    background: rgba(255,255,255,0.05);
    color:white;
    backdrop-filter: blur(8px);
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    margin-bottom:10px;
    resize:none;
    transition:0.2s;
  }

  button {
    padding:12px 24px;
    border-radius:50px;
    border:none;
    background: linear-gradient(135deg,#4ade80,#22d3ee);
    color:#111;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
  }
  button:hover {
    transform:scale(1.05);
    box-shadow:0 4px 20px rgba(0,255,255,0.5);
  }

  #answers {
    width:90%;
    max-width:450px;
    height:400px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:20px;
    padding:10px;
    border-radius:30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow:0 8px 32px rgba(0,0,0,0.7);
    scroll-behavior:smooth;
  }

  .bubble {
    padding:14px 18px;
    border-radius:30px;
    max-width:75%;
    line-height:1.4;
    word-wrap:break-word;
    position:relative;
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    0% {opacity:0; transform: translateY(10px);}
    100% {opacity:1; transform: translateY(0);}
  }

  .user {
    background: linear-gradient(135deg,#22d3ee,#4ade80);
    color:#111;
    align-self:flex-end;
  }

  .ai {
    background: rgba(255,255,255,0.08);
    color:#a5f3fc;
    align-self:flex-start;
    box-shadow:0 4px 12px rgba(0,255,255,0.2);
  }

</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<h1>AI Reply Helper</h1>

<textarea id="message" placeholder="Type your message..."></textarea>
<br>
<button onclick="generateReply()">Send</button>

<div id="answers"></div>

<script>
/* ---------------- Floating Background ---------------- */
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

const orbs = [];
const orbCount = 40;

class Orb {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random()*width;
    this.y = Math.random()*height;
    this.radius = Math.random()*6 + 2;
    this.vx = (Math.random()-0.5)*0.5;
    this.vy = (Math.random()-0.5)*0.5;
    this.alpha = Math.random()*0.5 + 0.2;
    this.color = `rgba(34, 211, 238, ${this.alpha})`;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > width || this.y < 0 || this.y > height){
      this.reset();
    }
    this.draw();
  }
}

for(let i=0;i<orbCount;i++){
  orbs.push(new Orb());
}

function animate(){
  ctx.clearRect(0,0,width,height);
  orbs.forEach(o=>o.update());
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', ()=>{
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});

/* ---------------- Chat Logic ---------------- */
async function generateReply() {
  const message = document.getElementById("message").value.trim();
  const answers = document.getElementById("answers");

  if (!message) return alert("Please enter a message!");

  // User bubble
  const userBubble = document.createElement("div");
  userBubble.className = "bubble user";
  userBubble.textContent = message;
  answers.appendChild(userBubble);

  // AI typing bubble
  const aiBubble = document.createElement("div");
  aiBubble.className = "bubble ai";
  aiBubble.textContent = "AI is typing...";
  answers.appendChild(aiBubble);

  answers.scrollTop = answers.scrollHeight;

  // Fake AI reply for demo
  setTimeout(()=>{
    aiBubble.textContent = "";
    const replies = [
      "Bas kat rahi hai",
      "Jese tese. Tum sunao",
      "Koi udhaar toh nahi maangna?"
    ];
    replies.forEach(r=>{
      const b = document.createElement("div");
      b.className = "bubble ai";
      b.textContent = r;
      answers.appendChild(b);
    });
    answers.scrollTop = answers.scrollHeight;
  },1000);

  document.getElementById("message").value="";
}
</script>

</body>
</html>
