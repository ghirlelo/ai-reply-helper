<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Reply Helper</title>
<style>
  body {
    margin:0;
    padding:0;
    font-family:"Segoe UI", sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color:white;
    overflow:hidden;
  }

  h1 {
    margin:20px 0;
    font-size:32px;
    letter-spacing:1px;
    color:#f0f0f0;
    text-shadow: 0 0 12px rgba(255,255,255,0.3);
  }

  textarea {
    width:90%;
    max-width:450px;
    height:70px;
    padding:14px;
    font-size:16px;
    border-radius:50px;
    border:none;
    outline:none;
    background: rgba(255,255,255,0.05);
    color:white;
    backdrop-filter: blur(8px);
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    margin-bottom:10px;
    resize:none;
    transition:0.2s;
  }
  textarea:focus {
    background: rgba(255,255,255,0.08);
    box-shadow:0 6px 24px rgba(0,0,0,0.6);
  }

  button {
    padding:12px 24px;
    border-radius:50px;
    border:none;
    background: linear-gradient(135deg,#4ade80,#22d3ee);
    color:#111;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
  }
  button:hover {
    transform:scale(1.05);
    box-shadow:0 4px 20px rgba(0,255,255,0.5);
  }

  select {
    padding:6px 12px;
    border-radius:30px;
    border:none;
    background: rgba(255,255,255,0.05);
    color:white;
    margin:5px;
    font-weight:bold;
  }

  #answers {
    width:90%;
    max-width:450px;
    height:450px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:20px;
    padding:10px;
    border-radius:30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow:0 8px 32px rgba(0,0,0,0.7);
    scroll-behavior:smooth;
  }

  .bubble {
    padding:14px 18px;
    border-radius:30px;
    max-width:75%;
    line-height:1.4;
    word-wrap:break-word;
    position:relative;
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    0% {opacity:0; transform: translateY(10px);}
    100% {opacity:1; transform: translateY(0);}
  }

  .user {
    background: linear-gradient(135deg,#22d3ee,#4ade80);
    color:#111;
    align-self:flex-end;
  }

  .ai {
    background: rgba(255,255,255,0.08);
    color:#a5f3fc;
    align-self:flex-start;
    box-shadow:0 4px 12px rgba(0,255,255,0.2);
  }

  .typing {
    width:40px;
    height:6px;
    border-radius:3px;
    background:#22d3ee;
    animation: blink 1s infinite alternate;
  }

  @keyframes blink {
    0%{opacity:0.2;}
    100%{opacity:1;}
  }

  .copy-btn {
    position:absolute;
    top:4px;
    right:6px;
    font-size:12px;
    background: #4ade80;
    border:none;
    border-radius:6px;
    padding:2px 6px;
    cursor:pointer;
    transition:0.2s;
  }
  .copy-btn:hover {
    background:#22d3ee;
  }

  ::-webkit-scrollbar {
    width:6px;
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius:3px;
  }
</style>
</head>
<body>

<h1>AI Reply Helper</h1>

<textarea id="message" placeholder="Type your message..."></textarea>
<br>
<select id="tone">
  <option value="friendly">Friendly</option>
  <option value="formal">Formal</option>
  <option value="funny">Funny</option>
</select>
<br>
<button onclick="generateReply()">Send</button>

<div id="answers"></div>

<script>
async function generateReply() {
  const message = document.getElementById("message").value.trim();
  const tone = document.getElementById("tone")?.value || "friendly";
  const answers = document.getElementById("answers");

  if (!message) return alert("Please enter a message!");

  // User bubble
  const userBubble = document.createElement("div");
  userBubble.className = "bubble user";
  userBubble.textContent = message;
  answers.appendChild(userBubble);

  // AI typing bubble
  const aiBubble = document.createElement("div");
  aiBubble.className = "bubble ai";
  const typingDiv = document.createElement("div");
  typingDiv.className = "typing";
  aiBubble.appendChild(typingDiv);
  answers.appendChild(aiBubble);

  answers.scrollTop = answers.scrollHeight;

  try {
    const res = await fetch("/api/reply", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message,tone})
    });

    const data = await res.json();

    // Remove typing and show AI replies
    aiBubble.innerHTML = "";
    const replies = data.reply.split("\n").filter(r=>r.trim()!=="");
    replies.forEach(r=>{
      const b = document.createElement("div");
      b.className = "bubble ai";
      b.textContent = r;

      const copyBtn = document.createElement("button");
      copyBtn.className = "copy-btn";
      copyBtn.textContent = "Copy";
      copyBtn.onclick = ()=>navigator.clipboard.writeText(r);
      b.appendChild(copyBtn);

      answers.appendChild(b);
    });

    answers.scrollTop = answers.scrollHeight;

  } catch(err) {
    aiBubble.textContent = "Something went wrong: "+err.message;
  }

  document.getElementById("message").value="";
}
</script>

</body>
</html>
