<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Reply Helper</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

h1{
margin-top:20px;
font-weight:500;
}

#chat{
width:90%;
max-width:450px;
height:60vh;
overflow-y:auto;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.bubble{
padding:12px 16px;
border-radius:20px;
max-width:75%;
animation:fade .2s ease;
position:relative;
}

@keyframes fade{
from{opacity:0;transform:translateY(5px)}
to{opacity:1}
}

.user{
background:linear-gradient(135deg,#22d3ee,#4ade80);
color:black;
align-self:flex-end;
}

.ai{
background:rgba(255,255,255,0.1);
align-self:flex-start;
}

.copy{
position:absolute;
top:4px;
right:6px;
font-size:11px;
cursor:pointer;
background:#22d3ee;
border:none;
border-radius:6px;
padding:2px 6px;
}

#inputBox{
margin-top:15px;
display:flex;
flex-direction:column;
align-items:center;
}

textarea{
width:90%;
max-width:450px;
height:60px;
border-radius:30px;
border:none;
padding:12px;
font-size:15px;
background:rgba(255,255,255,0.08);
color:white;
resize:none;
outline:none;
}

.controls{
margin-top:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:25px;
background:linear-gradient(135deg,#4ade80,#22d3ee);
cursor:pointer;
font-weight:bold;
}

select{
border-radius:20px;
padding:5px 10px;
border:none;
margin-right:5px;
}

#quickReplies{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:center;
}

.quick{
background:rgba(255,255,255,0.1);
border:none;
padding:6px 10px;
border-radius:15px;
cursor:pointer;
color:white;
}

.typing{
width:35px;
height:6px;
background:#22d3ee;
border-radius:3px;
animation:blink 1s infinite alternate;
}

@keyframes blink{
0%{opacity:0.2}
100%{opacity:1}
}

</style>
</head>

<body>

<h1>AI Reply Helper</h1>

<div id="chat"></div>

<div id="inputBox">

<textarea id="message" placeholder="Type message..."></textarea>

<div class="controls">
<select id="tone">
<option value="friendly">Friendly</option>
<option value="funny">Funny</option>
<option value="formal">Formal</option>
</select>

<button onclick="generateReply()">Send</button>
</div>

<div id="quickReplies"></div>

</div>

<script>

const chat=document.getElementById("chat")

// load history
chat.innerHTML=localStorage.getItem("chatHistory") || ""

async function generateReply(){

const message=document.getElementById("message").value.trim()
const tone=document.getElementById("tone").value

if(!message) return

// user bubble
const user=document.createElement("div")
user.className="bubble user"
user.textContent=message
chat.appendChild(user)

// typing
const typing=document.createElement("div")
typing.className="bubble ai"
typing.innerHTML='<div class="typing"></div>'
chat.appendChild(typing)

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("/api/reply",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message,tone})
})

const data=await res.json()

typing.remove()

const replies=data.reply.split("\n").filter(r=>r.trim()!="")

showQuickReplies(replies)

replies.forEach(r=>{

const b=document.createElement("div")
b.className="bubble ai"
b.textContent=r

const copy=document.createElement("button")
copy.className="copy"
copy.textContent="copy"
copy.onclick=()=>navigator.clipboard.writeText(r)

b.appendChild(copy)

chat.appendChild(b)

})

chat.scrollTop=chat.scrollHeight

localStorage.setItem("chatHistory",chat.innerHTML)

}catch(e){

typing.textContent="Error getting reply"

}

document.getElementById("message").value=""

}

function showQuickReplies(list){

const box=document.getElementById("quickReplies")
box.innerHTML=""

list.forEach(r=>{

const btn=document.createElement("button")
btn.className="quick"
btn.textContent=r
btn.onclick=()=>navigator.clipboard.writeText(r)

box.appendChild(btn)

})

}

// enter key send
document.getElementById("message").addEventListener("keypress",e=>{
if(e.key==="Enter"){
e.preventDefault()
generateReply()
}
})

</script>

</body>
</html>
