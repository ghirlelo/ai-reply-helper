<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Reply Helper</title>
<style>
  /* Body background */
  body {
    background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
    font-family: "Segoe UI", sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    color:white;
    min-height:100vh;
  }

  h1 {
    font-weight: 500;
    font-size: 28px;
    margin-bottom:20px;
    color:#f0f0f0;
    text-shadow:0 0 8px rgba(255,255,255,0.2);
  }

  textarea {
    width:90%;
    max-width:400px;
    height:80px;
    padding:12px;
    font-size:16px;
    border-radius:16px;
    border:none;
    background: rgba(255,255,255,0.1);
    color:white;
    backdrop-filter: blur(10px);
    outline:none;
    margin-bottom:10px;
  }

  select, button {
    padding:8px 14px;
    margin:5px;
    font-size:14px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    backdrop-filter: blur(10px);
  }

  button {
    background: rgba(37, 99, 235, 0.8);
    color:white;
    transition:0.2s;
  }
  button:hover {
    background: rgba(37, 99, 235, 1);
  }

  select {
    background: rgba(255,255,255,0.1);
    color:white;
  }

  #answers {
    width:90%;
    max-width:400px;
    height:400px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:10px;
    border-radius:20px;
    margin-top:10px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  .bubble {
    padding:12px 18px;
    border-radius:20px;
    max-width:80%;
    line-height:1.4;
    word-wrap:break-word;
    position:relative;
    backdrop-filter: blur(10px);
    box-shadow:0 4px 16px rgba(0,0,0,0.4);
    transition:0.2s;
  }

  .user {
    background: rgba(37, 99, 235, 0.8);
    color:white;
    align-self:flex-end;
    border-bottom-right-radius:4px;
  }

  .ai {
    background: rgba(255,255,255,0.1);
    color:#a5f3fc;
    align-self:flex-start;
    border-bottom-left-radius:4px;
  }

  .typing {
    width:40px;
    height:6px;
    border-radius:3px;
    background: #a5f3fc;
    animation: blink 1s infinite alternate;
  }

  @keyframes blink {
    0% {opacity:0.2;}
    100% {opacity:1;}
  }

  .copy-btn {
    position:absolute;
    top:4px;
    right:6px;
    font-size:12px;
    background: rgba(37,99,235,0.8);
    color:white;
    border:none;
    border-radius:6px;
    padding:2px 6px;
    cursor:pointer;
    transition:0.2s;
  }

  .copy-btn:hover {
    background: rgba(37,99,235,1);
  }
</style>
</head>
<body>

<h1>AI Reply Helper</h1>

<textarea id="message" placeholder="Type your message..."></textarea>
<br>
<select id="tone">
  <option value="friendly">Friendly</option>
  <option value="formal">Formal</option>
  <option value="funny">Funny</option>
</select>
<br>
<button onclick="generateReply()">Send</button>

<div id="answers"></div>

<script>
async function generateReply() {
  const message = document.getElementById("message").value.trim();
  const tone = document.getElementById("tone")?.value || "friendly";
  const answers = document.getElementById("answers");

  if (!message) return alert("Please enter a message!");

  // User bubble
  const userBubble = document.createElement("div");
  userBubble.className = "bubble user";
  userBubble.textContent = message;
  answers.appendChild(userBubble);

  // AI typing bubble
  const aiBubble = document.createElement("div");
  aiBubble.className = "bubble ai";
  const typingDiv = document.createElement("div");
  typingDiv.className = "typing";
  aiBubble.appendChild(typingDiv);
  answers.appendChild(aiBubble);

  answers.scrollTop = answers.scrollHeight;

  try {
    const res = await fetch("/api/reply", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message,tone})
    });

    const data = await res.json();

    // Remove typing and show actual AI replies
    aiBubble.innerHTML = "";
    const replies = data.reply.split("\n").filter(r=>r.trim()!=="");
    replies.forEach(r=>{
      const b = document.createElement("div");
      b.className = "bubble ai";
      b.textContent = r;

      // Copy button
      const copyBtn = document.createElement("button");
      copyBtn.className = "copy-btn";
      copyBtn.textContent = "Copy";
      copyBtn.onclick = ()=>navigator.clipboard.writeText(r);
      b.appendChild(copyBtn);

      answers.appendChild(b);
    });

    answers.scrollTop = answers.scrollHeight;

  } catch(err) {
    aiBubble.textContent = "Something went wrong: " + err.message;
  }

  document.getElementById("message").value = "";
}
</script>

</body>
</html>
