```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reply Helper AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:420px;
height:640px;
background:rgba(255,255,255,0.05);
border-radius:25px;
display:flex;
flex-direction:column;
overflow:hidden;
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(0,0,0,.5);
}

.header{
padding:15px;
text-align:center;
font-size:18px;
border-bottom:1px solid rgba(255,255,255,.1);
}

#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.bubble{
padding:12px 15px;
border-radius:18px;
max-width:70%;
font-size:14px;
}

.user{
background:#22c55e;
align-self:flex-end;
color:black;
}

.ai{
background:#1e293b;
align-self:flex-start;
}

textarea{
width:100%;
height:60px;
border:none;
outline:none;
border-radius:20px;
padding:10px;
background:#0f172a;
color:white;
resize:none;
}

.inputArea{
padding:15px;
border-top:1px solid rgba(255,255,255,.1);
}

button{
margin-top:8px;
padding:8px 16px;
border:none;
border-radius:20px;
background:#22d3ee;
cursor:pointer;
}

.typing{
font-size:12px;
opacity:.7;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
Reply Helper AI
</div>

<div id="chat"></div>

<div class="inputArea">
<textarea id="message" placeholder="Type message..."></textarea>
<button onclick="generateReply()">Send</button>
</div>

</div>

<script>

const chat=document.getElementById("chat")

async function generateReply(){

const msg=document.getElementById("message").value.trim()
if(!msg) return

const user=document.createElement("div")
user.className="bubble user"
user.textContent=msg
chat.appendChild(user)

const typing=document.createElement("div")
typing.className="bubble ai typing"
typing.textContent="AI typing..."
chat.appendChild(typing)

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("/api/reply",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
})

const data=await res.json()

typing.remove()

const text = data.reply || data.explanation || JSON.stringify(data)

for(let i=0;i<3;i++){

const b=document.createElement("div")
b.className="bubble ai"
b.textContent=text

chat.appendChild(b)

}

chat.scrollTop=chat.scrollHeight

}catch(err){

typing.textContent="Server error"

}

document.getElementById("message").value=""

}

</script>

</body>
</html>
