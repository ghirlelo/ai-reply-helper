<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Reply Helper</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at 30% 30%, #1a1a2e, #09090f);
  color:white;
  overflow:hidden;
}

.app{
  width:90%;
  max-width:400px;
  padding:20px;
  border-radius:30px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(0,0,0,0.5), 0 0 60px rgba(34,211,238,0.2);
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{ margin-bottom:20px; font-size: 24px; }

textarea{
  width:100%;
  height:100px;
  border-radius:20px;
  border:none;
  padding:15px;
  background:rgba(255,255,255,0.08);
  color:white;
  resize:none;
  outline:none;
  font-size:14px;
  box-sizing: border-box;
}

select{
  margin-top:10px;
  padding:8px 12px;
  border-radius:15px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:14px;
  cursor: pointer;
}

button#main-btn{
  margin-top:15px;
  padding:12px 25px;
  border-radius:20px;
  border:none;
  background:linear-gradient(135deg,#22d3ee,#4ade80);
  color:black;
  font-weight:600;
  cursor:pointer;
  transition: 0.2s;
}

button#main-btn:hover{ filter:brightness(1.1); transform: scale(1.02); }

#answers{ 
  margin-top:20px; 
  width:100%; 
  max-height: 200px; 
  overflow-y: auto; 
}

.reply-card {
  background:rgba(255,255,255,0.08);
  padding:12px;
  border-radius:15px;
  margin-bottom:10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.reply-text { font-size: 13px; line-height: 1.4; flex: 1; color: #e2e8f0; }

.actions { display: flex; gap: 6px; }

.action-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.copy-btn { background: #22d3ee; color: black; }
.wa-btn { background: #25D366; color: white; }
.action-btn:hover { opacity: 0.8; transform: scale(1.05); }
<link rel="manifest" href="/manifest.json">

</style>
</head>
<body>
<div class="app">
<h1>AI Reply Helper</h1>
<textarea id="message" placeholder="Paste your message here..."></textarea>
<select id="tone">
  <option value="friendly">😊 Friendly</option>
  <option value="formal">💼 Formal</option>
  <option value="funny">😂 Funny</option>
  <option value="savage">🔥 Savage</option>
</select>
<button id="main-btn" onclick="generateReply()">Get Reply Ideas</button>
<div id="answers"></div>
</div>

<script>
async function generateReply() {
  const message = document.getElementById("message").value.trim();
  const tone = document.getElementById("tone").value;
  const answers = document.getElementById("answers");
  
  if (!message) {
    answers.innerHTML = "<div class='reply-card'>Please enter a message!</div>";
    return;
  }

  answers.innerHTML = "<div class='reply-card'>AI is thinking...</div>";

  try {
    const res = await fetch("/api/reply", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message, tone })
    });

    const data = await res.json();
    let text = data.reply || data.explanation || "";

    const lines = text.split(/(?:\d\.|\n)/).filter(r => r.trim().length > 1).slice(0, 3);

    answers.innerHTML = "";
    
    lines.forEach(r => {
      const cleanR = r.replace(/[*#]/g, "").trim();
      const card = document.createElement("div");
      card.className = "reply-card";
      
      card.innerHTML = `
        <span class="reply-text">${cleanR}</span>
        <div class="actions">
          <button class="action-btn copy-btn" onclick="copyText('${cleanR.replace(/'/g, "\\'")}', this)">Copy</button>
          <button class="action-btn wa-btn" onclick="shareToWA('${cleanR.replace(/'/g, "\\'")}')">WA</button>
        </div>
      `;
      answers.appendChild(card);
    });

    if(lines.length === 0 && text) answers.innerHTML = `<div class='reply-card'>${text}</div>`;

  } catch (err) {
    answers.innerHTML = "<div class='reply-card'>Something went wrong: " + err.message + "</div>";
  }
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text);
  const oldText = btn.innerText;
  btn.innerText = "✓";
  setTimeout(() => { btn.innerText = oldText; }, 1200);
}

function shareToWA(text) {
  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
  // Using location.href is better for mobile app feel
  window.location.href = url;
}
</script>
</body>
</html>
