<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reply Helper AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at 20% 20%,#1a1a2e,#09090f);
overflow:hidden;
color:white;
}

/* animated background glow */

body::before{
content:"";
position:absolute;
width:800px;
height:800px;
background:radial-gradient(circle,#22d3ee55,transparent 60%);
top:-200px;
left:-200px;
animation:float 10s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#a78bfa55,transparent 60%);
bottom:-200px;
right:-200px;
animation:float2 12s infinite alternate;
}

@keyframes float{
from{transform:translate(0,0)}
to{transform:translate(100px,60px)}
}

@keyframes float2{
from{transform:translate(0,0)}
to{transform:translate(-100px,-80px)}
}

/* main container */

.app{
width:420px;
height:650px;
backdrop-filter:blur(25px);
background:rgba(255,255,255,0.05);
border-radius:30px;
border:1px solid rgba(255,255,255,0.1);
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:
0 0 40px rgba(0,0,0,0.6),
0 0 60px rgba(34,211,238,0.2);
}

/* header */

.header{
padding:18px;
text-align:center;
font-size:18px;
font-weight:500;
border-bottom:1px solid rgba(255,255,255,0.08);
letter-spacing:0.5px;
}

/* chat */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
scroll-behavior:smooth;
}

/* bubbles */

.bubble{
max-width:75%;
padding:12px 16px;
border-radius:18px;
font-size:14px;
line-height:1.4;
position:relative;
animation:pop .2s ease;
}

@keyframes pop{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,#22d3ee,#4ade80);
color:black;
}

.ai{
align-self:flex-start;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
}

/* copy button */

.copy{
position:absolute;
top:4px;
right:6px;
font-size:10px;
border:none;
background:#22d3ee;
color:black;
border-radius:6px;
padding:2px 6px;
cursor:pointer;
opacity:0;
transition:.2s;
}

.bubble:hover .copy{
opacity:1;
}

/* input */

.inputArea{
padding:15px;
border-top:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
gap:10px;
}

textarea{
width:100%;
height:55px;
border-radius:25px;
border:none;
padding:12px;
font-family:Inter;
resize:none;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
}

.controls{
display:flex;
justify-content:space-between;
align-items:center;
}

select{
background:rgba(255,255,255,0.1);
border:none;
color:white;
border-radius:20px;
padding:5px 10px;
}

button{
background:linear-gradient(135deg,#22d3ee,#4ade80);
border:none;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
font-weight:500;
}

/* quick replies */

#quick{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:5px;
}

.quickBtn{
background:rgba(255,255,255,0.08);
border:none;
border-radius:14px;
padding:5px 10px;
font-size:12px;
cursor:pointer;
color:white;
transition:.2s;
}

.quickBtn:hover{
background:#22d3ee;
color:black;
}

/* typing indicator */

.typing{
width:40px;
height:8px;
border-radius:4px;
background:#22d3ee;
animation:blink 1s infinite alternate;
}

@keyframes blink{
from{opacity:.3}
to{opacity:1}
}

</style>
</head>

<body>

<div class="app">

<div class="header">
Reply Helper AI
</div>

<div id="chat"></div>

<div class="inputArea">

<textarea id="message" placeholder="Type a message..."></textarea>

<div class="controls">
<select id="tone">
<option value="friendly">Friendly</option>
<option value="funny">Funny</option>
<option value="formal">Formal</option>
</select>

<button onclick="generateReply()">Send</button>
</div>

<div id="quick"></div>

</div>

</div>

<script>

const chat=document.getElementById("chat")

chat.innerHTML=localStorage.getItem("history") || ""

async function generateReply(){

const msg=document.getElementById("message").value.trim()
const tone=document.getElementById("tone").value

if(!msg) return

const user=document.createElement("div")
user.className="bubble user"
user.textContent=msg
chat.appendChild(user)

const typing=document.createElement("div")
typing.className="bubble ai"
typing.innerHTML='<div class="typing"></div>'
chat.appendChild(typing)

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("/api/reply",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg,tone})
})

const data=await res.json()

typing.remove()

const replies=data.reply.split("\n").filter(r=>r.trim()!="")

showQuick(replies)

replies.forEach(r=>{

const b=document.createElement("div")
b.className="bubble ai"
b.textContent=r

const copy=document.createElement("button")
copy.className="copy"
copy.textContent="copy"
copy.onclick=()=>navigator.clipboard.writeText(r)

b.appendChild(copy)

chat.appendChild(b)

})

chat.scrollTop=chat.scrollHeight

localStorage.setItem("history",chat.innerHTML)

}catch(e){
typing.textContent="AI error"
}

document.getElementById("message").value=""

}

function showQuick(list){

const box=document.getElementById("quick")
box.innerHTML=""

list.forEach(r=>{

const btn=document.createElement("button")
btn.className="quickBtn"
btn.textContent=r
btn.onclick=()=>navigator.clipboard.writeText(r)

box.appendChild(btn)

})

}

document.getElementById("message").addEventListener("keypress",e=>{
if(e.key==="Enter"){
e.preventDefault()
generateReply()
}
})

</script>

</body>
</html>
