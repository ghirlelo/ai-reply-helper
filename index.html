<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reply Helper 2026</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        select, button { width: 100%; margin-top: 10px; padding: 12px; border-radius: 8px; border: none; cursor: pointer; }
        button { background: #007bff; color: white; font-weight: bold; }
        #output { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .reply-box { background: #eef2ff; padding: 10px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; border: 1px solid #d1d5db; transition: 0.2s; }
        .reply-box:hover { background: #dbeafe; }
    </style>
</head>
<body>

<div class="card">
    <h3>Reply Helper (Roman Urdu)</h3>
    <textarea id="messageInput" placeholder="Enter message..."></textarea>
    
    <select id="toneSelect">
        <option value="friendly">Friendly 😊</option>
        <option value="savage">Savage 🔥</option>
        <option value="formal">Formal 👔</option>
    </select>

    <button id="getReplyBtn">Get Replies</button>

    <div id="output"></div>
</div>

<script>
    const btn = document.getElementById('getReplyBtn');
    const output = document.getElementById('output');

    btn.onclick = async () => {
        const message = document.getElementById('messageInput').value;
        const tone = document.getElementById('toneSelect').value;

        if(!message) return alert("Kuch likhen pehle!");

        btn.innerText = "Loading...";
        output.innerHTML = "";

        try {
            const res = await fetch('/api/reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, tone })
            });

            const data = await res.json();
            btn.innerText = "Get Replies";

            if (data.reply) {
                const lines = data.reply.split("\n");
                lines.forEach(line => {
                    const div = document.createElement('div');
                    div.className = "reply-box";
                    div.innerText = line;
                    div.onclick = () => {
                        navigator.clipboard.writeText(line);
                        alert("Copied: " + line);
                    };
                    output.appendChild(div);
                });
            }
        } catch (err) {
            btn.innerText = "Error!";
            output.innerText = "Connection failed.";
        }
    };
</script>
</body>
</html>
