<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Reply Helper</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
    .container { max-width: 500px; margin: 50px auto; background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    h1 { color: #3b82f6; margin-bottom: 20px; }
    textarea { width: 100%; height: 100px; padding: 15px; border-radius: 12px; border: none; outline: none; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; resize: none; margin-bottom: 10px; }
    .options { margin: 20px 0; display: flex; gap: 10px; justify-content: center; }
    select { padding: 10px; border-radius: 8px; background: #334155; color: white; border: none; cursor: pointer; }
    button.gen-btn { background: #2563eb; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button.gen-btn:hover { background: #1d4ed8; transform: scale(1.05); }
    #answers { margin-top: 25px; text-align: left; background: #0f172a; padding: 10px; border-radius: 12px; min-height: 50px; }
    .reply-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #3b82f6; }
    .copy-btn { background: #334155; color: #93c5fd; border: 1px solid #3b82f6; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
    .loader { border: 3px solid #334155; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reply Helper 😎</h1>
    <textarea id="message" placeholder="Paste the message you received here..."></textarea>
    <div class="options">
      <select id="tone">
        <option value="friendly">😊 Friendly</option>
        <option value="formal">💼 Professional</option>
        <option value="funny">😂 Funny</option>
        <option value="savage">🔥 Savage</option>
      </select>
      <button class="gen-btn" onclick="generateReply()">Get Replies</button>
    </div>
    <div id="answers"></div>
  </div>

  <script>
    async function generateReply() {
      const message = document.getElementById("message").value.trim();
      const tone = document.getElementById("tone").value;
      const answers = document.getElementById("answers");
      if (!message) return alert("Please paste a message first!");
      answers.innerHTML = '<div class="loader"></div>';
      try {
        const res = await fetch("/api/reply", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, tone })
        });
        const data = await res.json();
        const suggestions = data.reply.split(/\d\./).filter(s => s.trim() !== "");
        answers.innerHTML = "";
        suggestions.forEach(text => {
          const cleanText = text.replace(/[*#]/g, "").trim();
          const div = document.createElement("div");
          div.className = "reply-item";
          div.innerHTML = `<span>${cleanText}</span><button class="copy-btn" onclick="copyText('${cleanText.replace(/'/g, "\\'")}')">Copy</button>`;
          answers.appendChild(div);
        });
      } catch (err) {
        answers.innerHTML = "<p style='color:red;'>Error connecting to AI.</p>";
      }
    }
    function copyText(text) {
      navigator.clipboard.writeText(text);
      alert("Copied!");
    }
  </script>
</body>
</html>
